<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>olliesharddrive.com</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="preload" as="image" href="me.jpg">
<style>
    @font-face {
    font-family: font1;
    src: url(AlteHaasGrotesk-Regular.woff);
    }
    @font-face {
    font-family: nahwc-font;
    src: url(games/nahwc/imadethismyself-3.ttf);
    }
    @font-face {
    font-family: pico-font;
    src: url(games/picocraft/pico-8.ttf);
    }
    @font-face {
    font-family: gato-font;
    src: url(games/gatoloco/gatofont.woff2) format('woff2');
    }
    html {
        overflow-x: hidden;
    }
    body {
        font-family: font1;
        margin: 0px;
        color: white;
        background-color: black;
        font-variant-ligatures: none;
    }
    p {
        margin: 0px;
        font-size: 21px;
    }
    .spread {
        width: 100%;
        margin-top: 0vh;
        height: 100vh;
        background-color: black;
        display: flex;
        flex-direction: row;
    }
    .sidebar {
        background-color: black;
        height: 100vh;
        width: 350px;
        flex-shrink: 0;
        overflow: visible;
        position: relative;
        z-index: 1;
    }
    .info {
        height: max(150px, calc(50vh - 6em));
        padding-top: 14px;
        padding-left: 14px;
        box-sizing: border-box;
    }
    .menubar {
        display: flex;
        flex-direction: row;
        padding-bottom: 4px;
        white-space: nowrap;
    }
    .filesystem {
        width: 350px;
        height: calc(50vh + 6em);
        display: flex;
        background-color: black;
        padding-left: 14px;
        box-sizing: border-box;
        overflow: hidden;
    }
    .foldercolumn {
        width: 175px;
        height: 100%;
    }
    .content {
        background-color: black;
        height: 100%;
        width: calc(100vw - 350px);
        overflow-y: auto;
        padding-right: 14px;
        padding-top: calc(max(150px, calc(50vh - 6em)));
        scroll-padding-top: calc(max(150px, calc(50vh - 6em)));
        box-sizing: border-box;
        scroll-snap-type: y mandatory;
        will-change: transform;
    }
    #highlight {
        background-color: white;
        color: black;
        padding: 0 5px;
    }
    #highlight:hover, #mobile-highlight:hover { text-decoration: underline !important; text-decoration-color: black; }

    .selection {
        padding-top: 1px;
        padding-bottom: 1px;
        padding-left: 5px;
        padding-right: 6px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
        line-height: 1;
    }
    .selection::after {
        content: '';
        display: block;
        flex-shrink: 0;
        width: 0;
        height: 0;
        border-top: 6px solid transparent;
        border-bottom: 6px solid transparent;
        border-left: 11px solid white;
        visibility: hidden;
    }
    .selection:hover::after {
        visibility: visible;
    }
    .selection.active {
        background-color: white;
        color: black;
    }
    .selection.active:hover::after {
        border-left-color: black;
    }
    .song-item {
        padding-top: 1px;
        padding-bottom: 1px;
        padding-left: 5px;
        cursor: pointer;
        display: flex;
        align-items: flex-end;
        gap: 5px;
        scroll-snap-align: start;
        line-height: 1;
    }
    .content > p:not(.song-item) {
        line-height: 1;
        padding-top: 1px;
    }
    .song-title {
        flex: 0 1 auto;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
    }
    .song-item:hover .song-title {
        text-decoration: underline;
    }
    .song-item.active {
        background-color: white;
        color: black;
    }
    .song-duration {
        flex-shrink: 0;
        font-size: 18px;
        color: rgba(255,255,255,0.5);
    }
    .song-item.active .song-duration {
        color: rgba(0,0,0,0.5);
    }
    .album-cover {
        display: none;
        width: 45%;
        max-width: 220px;
        height: auto;
        padding: 0 0 14px 5px;
    }
    #audioplayercontainer {
        margin-top: 20px;
        padding-right: 14px;
        user-select: none;
    }
    #seekbar {
        position: relative;
        height: 14px;
        display: flex;
        align-items: center;
        cursor: pointer;
        width: 100%;
    }
    #track-line {
        position: absolute;
        width: 100%;
        height: 1px;
        background-color: rgba(255,255,255,0.5);
    }
    #seek-thumb {
        position: absolute;
        width: 7px;
        height: 7px;
        background-color: white;
        border-radius: 50%;
        left: 0%;
        transform: translateX(-50%);
        pointer-events: none;
    }
    #player-times {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        color: rgba(255,255,255,0.45);
        margin-top: 1px;
    }
    #play-pause-btn {
        margin-top: 4px;
        cursor: pointer;
        color: white;
        display: inline-block;
    }
    #play-pause-btn:hover {
        color: white;
    }
    .playertext {
        display: flex;
        margin-top: 3px;
    }
    .playertext p:hover { text-decoration: underline; }
    .sidebar.divider { border-right: 1px solid rgba(255,255,255,0.18); }
    .content.center-view {
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding-left: 10vw;
        padding-right: 10vw;
    }
    .content::-webkit-scrollbar {
        width: 6px;
    }
    .content::-webkit-scrollbar-track {
        background: black;
    }
    .content::-webkit-scrollbar-thumb {
        background: white;
    }
    .content::-webkit-scrollbar-thumb:hover {
        background: rgba(255,255,255,0.6);
    }

    /* ─── Mobile elements (hidden on desktop) ─── */
    #mobile-header {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0;
        background: black;
        z-index: 100;
        padding: 10px;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        box-sizing: border-box;
        border-bottom: 1px solid rgba(255,255,255,0.18);
    }
    #mobile-header-left {
        display: flex;
        flex-direction: column;
        gap: 2px;
        flex: 1;
        min-width: 0;
    }
    #mobile-path-wrap {
        display: flex;
        align-items: center;
        gap: 3px;
        overflow: hidden;
        min-width: 0;
        white-space: nowrap;
    }
    #mobile-path {
        font-size: 21px;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    #hamburger-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
        flex-shrink: 0;
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: visible;
    }
    #hamburger-icon, #close-icon {
        display: block;
    }
    #mobile-highlight {
        background-color: white;
        color: black;
        padding: 0 5px;
        text-decoration: none;
    }
    /* nav: grid trick for smooth exact-height animation */
    #mobile-nav {
        display: none;
        grid-template-rows: 0fr;
        flex-shrink: 0;
        width: 100%;
        background: black;
        transition: grid-template-rows 0.32s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #mobile-nav.open { grid-template-rows: 1fr; }
    #mobile-nav-inner {
        overflow: hidden;
        padding: 8px 12px 6px;
        box-sizing: border-box;
        border-bottom: 1px solid rgba(255,255,255,0.15);
    }
    .mob-acc-cat {
        padding: 9px 6px 9px 5px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
        line-height: 1;
    }
    .mob-acc-cat::after {
        content: '';
        display: block;
        flex-shrink: 0;
        width: 0; height: 0;
        border-top: 6px solid transparent;
        border-bottom: 6px solid transparent;
        border-left: 11px solid white;
        transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .mob-acc-cat.open::after { transform: rotate(90deg); }
    /* accordion content: same grid trick */
    .mob-acc-wrap {
        display: grid;
        grid-template-rows: 0fr;
        transition: grid-template-rows 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .mob-acc-wrap.open { grid-template-rows: 1fr; }
    .mob-acc-inner {
        overflow: hidden;
        padding-left: 14px;
    }
    .mob-acc-inner .selection {
        padding-top: 9px;
        padding-bottom: 9px;
    }
    .mob-acc-inner .selection::after { display: none; }
    #mobile-player {
        display: none;
        position: fixed;
        bottom: 0; left: 0; right: 0;
        background: black;
        z-index: 100;
        border-top: 1px solid rgba(255,255,255,0.18);
        padding: 6px 16px 16px;
        flex-direction: column;
        gap: 2px;
        user-select: none;
        box-sizing: border-box;
    }
    #mobile-seekbar {
        position: relative;
        height: 14px;
        display: flex;
        align-items: center;
        cursor: pointer;
    }
    #mobile-track-line {
        position: absolute;
        width: 100%;
        height: 2px;
        background-color: rgba(255,255,255,0.5);
    }
    #mobile-seek-thumb {
        position: absolute;
        width: 11px;
        height: 11px;
        background-color: white;
        border-radius: 50%;
        left: 0%;
        transform: translateX(-50%);
        pointer-events: none;
    }
    #mobile-player-times {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        color: rgba(255,255,255,0.45);
    }
    #mobile-play-btn {
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        align-self: center;
        margin-top: 4px;
        width: 38px;
        height: 38px;
        border: 2px solid rgba(255,255,255,0.35);
        border-radius: 50%;
        flex-shrink: 0;
    }
    #mobile-play-btn svg { width: 16px; height: 18px; }
    #mobile-play-icon { margin-left: 3px; }
    #mobile-song-label:hover { text-decoration: underline; }
    #mobile-song-label {
        font-size: 14px;
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin: 0;
    }

    .now-card { width: 30%; }
    .appstore-badge { height: 50px; display: block; margin-top: 8px; }

    .nahwc-img { width: 200px; height: auto; image-rendering: pixelated; }
    .nahwc-imgs { display:flex; flex-direction:row; align-items:flex-start; width:100%; }

    /* ─── Mobile layout ─── */
    @media (max-width: 768px) {
        html, body { overflow: hidden !important; }
        .sidebar { display: none !important; }
        p { font-size: 14px !important; }
        #mobile-path { font-size: 14px !important; }
        .song-duration { font-size: 14px !important; }
        .pico-text { font-size: 11px !important; }
        .content { user-select: none !important; -webkit-user-select: none !important; }
        .spread {
            flex-direction: column !important;
            padding-top: 65px !important;
            box-sizing: border-box !important;
        }
        #mobile-nav { display: grid !important; }
        .content {
            display: block !important;
            flex: 1 !important;
            min-height: 0 !important;
            height: auto !important;
            width: 100vw !important;
            padding-top: 28px !important;
            padding-left: 14px !important;
            padding-right: 14px !important;
            padding-bottom: 260px !important;
            scroll-padding-top: 0 !important;
            scroll-snap-type: none !important;
        }
        #mobile-header { display: flex; }
        #mobile-player { display: flex; }
        .content { scrollbar-width: none !important; }
        .content::-webkit-scrollbar { display: none !important; }
        .song-item {
            padding-top: 13px;

            padding-right: 5px;
            border-bottom: 1px solid rgba(255,255,255,0.12);
        }
        .song-title { flex: 1 !important; }
        .album-cover { display: block !important; width: 100% !important; max-width: none !important; padding-left: 0 !important; padding-right: 0 !important; }
        .content img:not(.album-cover):not(.now-card):not(.appstore-badge):not(.player-sprite):not(.nahwc-img):not(.inline-icon):not(.nahwc-award):not(.cover-img) { width: 100% !important; max-width: none !important; height: auto !important; padding-left: 0 !important; }
        .nahwc-img { width: 50% !important; }
        .sexkick-logo { display:block; margin-left:auto; margin-right:auto; padding-left:0 !important; }
        .mobile-center { text-align:center !important; }
        .picocraft-game { display:block !important; margin:0 auto !important; text-align:center !important; }
        .play-now-btn { font-size:24px !important; padding:10px 28px !important; }

        .nahwc-imgs { flex-direction: column !important; align-items: center !important; }
        .nahwc-logo { order: -1; }
        .nahwc-left-col { width: 100%; align-items: center; display: flex; flex-direction: column; }
        .nahwc-award { position: static !important; width: 25% !important; display: block !important; margin: 10px auto 0 !important; }
        .now-card { width: 75% !important; }
        .appstore-badge { height: 70px !important; display: block !important; margin: 8px auto 0 !important; }
        .cover-grid { display: block !important; }
        .cover-grid > div { display: block !important; margin-bottom: 20px !important; }
        .cover-img { width: 100% !important; height: auto !important; display: block !important; }
    }
</style>

<script>
(function() {
    const audio             = document.getElementById('audio');
    const thumb             = document.getElementById('seek-thumb');
    const mobileThumb       = document.getElementById('mobile-seek-thumb');
    const seekbar           = document.getElementById('seekbar');
    const mobileSeekbar     = document.getElementById('mobile-seekbar');
    const currentTimeEl     = document.getElementById('current-time');
    const remainingEl       = document.getElementById('remaining-time');
    const mobileCurrentTimeEl = document.getElementById('mobile-current-time');
    const mobileRemainingEl   = document.getElementById('mobile-remaining-time');
    const playBtn           = document.getElementById('play-pause-btn');
    const playIcon          = document.getElementById('play-icon');
    const pauseIcon         = document.getElementById('pause-icon');
    const mobilePlayBtn     = document.getElementById('mobile-play-btn');
    const mobilePlayIcon    = document.getElementById('mobile-play-icon');
    const mobilePauseIcon   = document.getElementById('mobile-pause-icon');

    function fmt(s) {
        s = Math.floor(s) || 0;
        return Math.floor(s / 60) + ':' + ('0' + (s % 60)).slice(-2);
    }

    function updateUI() {
        const pct = audio.duration ? audio.currentTime / audio.duration : 0;
        const cur = fmt(audio.currentTime);
        const rem = '-' + fmt((audio.duration || 0) - audio.currentTime);
        thumb.style.left             = (pct * 100) + '%';
        mobileThumb.style.left       = (pct * 100) + '%';
        currentTimeEl.textContent    = cur;
        remainingEl.textContent      = rem;
        mobileCurrentTimeEl.textContent = cur;
        mobileRemainingEl.textContent   = rem;
    }

    audio.addEventListener('timeupdate', updateUI);
    audio.addEventListener('loadedmetadata', () => {
        const rem = '-' + fmt(audio.duration);
        remainingEl.textContent       = rem;
        mobileRemainingEl.textContent = rem;
    });
    audio.addEventListener('play', () => {
        playIcon.style.display        = 'none';
        pauseIcon.style.display       = 'inline';
        mobilePlayIcon.style.display  = 'none';
        mobilePauseIcon.style.display = 'inline';
    });
    audio.addEventListener('pause', () => {
        playIcon.style.display        = 'inline';
        pauseIcon.style.display       = 'none';
        mobilePlayIcon.style.display  = 'inline';
        mobilePauseIcon.style.display = 'none';
    });

    playBtn.addEventListener('click', () => {
        if (audio.paused) audio.play().catch(() => {});
        else audio.pause();
    });
    mobilePlayBtn.addEventListener('click', () => {
        if (audio.paused) audio.play().catch(() => {});
        else audio.pause();
    });

    function seekTo(e) {
        if (!audio.duration) return;
        const rect = seekbar.getBoundingClientRect();
        const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        audio.currentTime = pct * audio.duration;
    }

    let dragging = false;
    seekbar.addEventListener('mousedown', (e) => { dragging = true; seekTo(e); });
    document.addEventListener('mousemove', (e) => { if (dragging) seekTo(e); });
    document.addEventListener('mouseup', () => { dragging = false; });

    function mobileSeekTo(clientX) {
        if (!audio.duration) return;
        const rect = mobileSeekbar.getBoundingClientRect();
        const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
        audio.currentTime = pct * audio.duration;
    }

    let mobileDragging = false;
    mobileSeekbar.addEventListener('mousedown', (e) => { mobileDragging = true; mobileSeekTo(e.clientX); });
    document.addEventListener('mousemove', (e) => { if (mobileDragging) mobileSeekTo(e.clientX); });
    document.addEventListener('mouseup', () => { mobileDragging = false; });
    mobileSeekbar.addEventListener('touchstart', (e) => { mobileSeekTo(e.touches[0].clientX); }, { passive: true });
    mobileSeekbar.addEventListener('touchmove', (e) => { e.preventDefault(); mobileSeekTo(e.touches[0].clientX); }, { passive: false });
})();

(function() {
    const fontImages = { '1': new Image(), '2': new Image(), '3': new Image() };
    fontImages['1'].src = 'games/downit/font1.png';
    fontImages['2'].src = 'games/downit/font2.png';
    fontImages['3'].src = 'games/downit/font3.png';

    const playerFrames = ['games/downit/player/one.png', 'games/downit/player/two.png', 'games/downit/player/three.png']
        .map(src => { const img = new Image(); img.src = src; return img; });

    function renderBitmapText(text, container, { fontKey = '1', scale = 1, width = null } = {}) {
        const charset = " abcdefghijklmnopqrstuvwxyz0123456789:+()FSMHE-?";
        const charW = 29, charH = 31, srcStride = 32, srcOffset = 3;
        const scaledW = Math.round(charW * scale), scaledH = Math.round(charH * scale);
        let currentFontImg = fontImages[fontKey];
        let lastContentW = 0;

        const cv = document.createElement('canvas');
        cv.style.cssText = 'display:block; image-rendering:pixelated; image-rendering:crisp-edges;';

        function draw(contentW) {
            if (contentW !== undefined) lastContentW = contentW;
            const maxW = Math.max(Math.floor(lastContentW) - 5, 200);
            const rawLines = text.split('\n');
            const allLines = [];
            for (const raw of rawLines) {
                if (!raw.trim()) { allLines.push(null); continue; }
                const words = raw.split(' ');
                let line = [], lineW = 0;
                for (const word of words) {
                    const wW = [...word].filter(c => charset.includes(c.toLowerCase())).length * scaledW;
                    if (lineW > 0 && lineW + scaledW + wW > maxW) {
                        allLines.push(line.join(''));
                        line = [word]; lineW = wW;
                    } else {
                        if (lineW > 0) { line.push(' '); lineW += scaledW; }
                        line.push(word); lineW += wW;
                    }
                }
                if (line.length) allLines.push(line.join(''));
            }
            const blankH = Math.round(scaledH * 0.6);
            const totalH = allLines.reduce((h, l) => h + (l === null ? blankH : scaledH), 0);
            cv.width = maxW; cv.height = totalH || scaledH;
            const ctx = cv.getContext('2d');
            ctx.imageSmoothingEnabled = false;
            let y = 0;
            for (const line of allLines) {
                if (line === null) { y += blankH; continue; }
                let x = 0;
                for (const ch of line) {
                    const idx = charset.indexOf(ch.toLowerCase());
                    if (idx >= 0) {
                        ctx.drawImage(currentFontImg, srcOffset + idx * srcStride, 1, charW, charH, x, y, scaledW, scaledH);
                        x += scaledW;
                    }
                }
                y += scaledH;
            }
        }

            draw(width);
        } else {
            const cs = getComputedStyle(container);
            draw(container.clientWidth - parseFloat(cs.paddingLeft) - parseFloat(cs.paddingRight));
            const ro = new ResizeObserver(entries => {
                if (!cv.isConnected) { ro.disconnect(); return; }
                draw(entries[0].contentRect.width);
            });
            ro.observe(container);
        }
        cv._redraw = (img) => { currentFontImg = img; draw(); };
        return cv;

                    const TILE = 32;
                    let terrainH = 7, terrainTarget = 7, treeCountdown = 8;
                    const terrain = [];

                    function genCol() {
                        if (Math.random() < 0.08)
                            terrainTarget = Math.max(7, Math.min(9, terrainTarget + (Math.random() < 0.5 ? -1 : 1)));
                        terrainH += (terrainTarget - terrainH) * 0.2;
                        let tree = null;
                        if (treeCountdown <= 0 && Math.random() < 0.15) {
                            tree = true;
                            treeCountdown = 6 + Math.floor(Math.random() * 8);
                        } else treeCountdown--;
                        terrain.push({ h: Math.round(terrainH), tree });
                    }
                    for (let i = 0; i < 200; i++) genCol();

                    const TILE2 = 20;
                    let bgH = 6, bgTarget = 6, bgTreeCd = 10;
                    const terrain2 = [];

                    function genCol2() {
                        if (Math.random() < 0.07)
                            bgTarget = Math.max(5, Math.min(8, bgTarget + (Math.random() < 0.5 ? -1 : 1)));
                        bgH += (bgTarget - bgH) * 0.15;
                        let tree = null;
                        if (bgTreeCd <= 0 && Math.random() < 0.12) {
                            tree = true;
                            bgTreeCd = 8 + Math.floor(Math.random() * 10);
                        } else bgTreeCd--;
                        terrain2.push({ h: Math.round(bgH), tree });
                    }
                    for (let i = 0; i < 300; i++) genCol2();

                    const tiles = {};
                    let loaded = 0;
                    ['dirt', 'grass', 'leaf', 'log'].forEach(n => {
                        const img = new Image();
                        img.onload = () => { if (++loaded === 4) startAnim(); };
                        img.src = `games/picocraft/${n}.png`;
                        tiles[n] = img;
                    });

                    let canvasW = 0, canvasH = 0;
                    const ro = new ResizeObserver(([e]) => {
                        canvasW = Math.round(e.contentRect.width);
                        canvasH = Math.round(e.contentRect.height);
                    });
                    ro.observe(canvas);

                    function startAnim() {
                        let scrollPx = 0, lastTs = null, animId = null;
                        const ctx  = canvas.getContext('2d');
                        const ctx2 = canvas2.getContext('2d');
                        ctx.imageSmoothingEnabled = false;
                        ctx2.imageSmoothingEnabled = false;

                        function draw(ts) {
                            if (!canvas.isConnected) { cancelAnimationFrame(animId); ro.disconnect(); return; }
                            const dt = lastTs !== null ? ts - lastTs : 0;
                            lastTs = ts;
                            scrollPx += 20 * dt / 1000;

                            const dpr = window.devicePixelRatio || 1;
                            const needW = Math.round(canvasW * dpr);
                            const needH = Math.round(canvasH * dpr);
                            if (canvas.width !== needW || canvas.height !== needH) {
                                canvas.width  = needW;
                                canvas.height = needH;
                                canvas2.width  = needW;
                                canvas2.height = needH;
                            }

                            const firstCol = Math.floor(scrollPx / TILE);
                            const visCols = Math.ceil(canvasW / TILE) + 2;
                            while (terrain.length < firstCol + visCols + 20) genCol();

                            // background parallax layer
                            const bgScroll = scrollPx * 0.45;
                            const bgFirst = Math.floor(bgScroll / TILE2);
                            const bgVis = Math.ceil(canvasW / TILE2) + 2;
                            while (terrain2.length < bgFirst + bgVis + 20) genCol2();
                            ctx2.setTransform(dpr, 0, 0, dpr, 0, 0);
                            ctx2.imageSmoothingEnabled = false;
                            ctx2.clearRect(0, 0, canvasW, canvasH);
                            const bgOx = -(bgScroll % TILE2);
                            const bgLift = Math.round(canvasH * 0.18);
                            for (let i = -3; i <= bgVis + 2; i++) {
                                const ci = bgFirst + i;
                                if (ci < 0 || ci >= terrain2.length) continue;
                                const { h, tree } = terrain2[ci];
                                const x = Math.round(bgOx + i * TILE2);
                                const groundY = canvasH - h * TILE2 - bgLift;
                                ctx2.drawImage(tiles.grass, x, groundY, TILE2, TILE2);
                                for (let y = groundY + TILE2; y <= canvasH + TILE2; y += TILE2)
                                    ctx2.drawImage(tiles.dirt, x, y, TILE2, TILE2);
                                if (tree) {
                                    ctx2.drawImage(tiles.log, x, groundY - TILE2,     TILE2, TILE2);
                                    ctx2.drawImage(tiles.log, x, groundY - 2 * TILE2, TILE2, TILE2);
                                    for (let lx = -2; lx <= 2; lx++)
                                        ctx2.drawImage(tiles.leaf, x + lx * TILE2, groundY - 3 * TILE2, TILE2, TILE2);
                                    for (let lx = -2; lx <= 2; lx++)
                                        ctx2.drawImage(tiles.leaf, x + lx * TILE2, groundY - 4 * TILE2, TILE2, TILE2);
                                    for (let lx = -1; lx <= 1; lx++)
                                        ctx2.drawImage(tiles.leaf, x + lx * TILE2, groundY - 5 * TILE2, TILE2, TILE2);
                                }
                            }

                            // foreground layer
                            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                            ctx.imageSmoothingEnabled = false;
                            ctx.clearRect(0, 0, canvasW, canvasH);
                            const ox = -(scrollPx % TILE);

                            for (let i = -3; i <= visCols + 2; i++) {
                                const ci = firstCol + i;
                                if (ci < 0 || ci >= terrain.length) continue;
                                const { h, tree } = terrain[ci];
                                const x = Math.round(ox + i * TILE);
                                const groundY = canvasH - h * TILE;

                                ctx.drawImage(tiles.grass, x, groundY, TILE, TILE);
                                for (let y = groundY + TILE; y <= canvasH + TILE; y += TILE)
                                    ctx.drawImage(tiles.dirt, x, y, TILE, TILE);

                                if (tree) {
                                    // 2 log tiles
                                    ctx.drawImage(tiles.log, x, groundY - TILE,     TILE, TILE);
                                    ctx.drawImage(tiles.log, x, groundY - 2 * TILE, TILE, TILE);
                                    // row 1: 5 leaves
                                    for (let lx = -2; lx <= 2; lx++)
                                        ctx.drawImage(tiles.leaf, x + lx * TILE, groundY - 3 * TILE, TILE, TILE);
                                    // row 2: 5 leaves
                                    for (let lx = -2; lx <= 2; lx++)
                                        ctx.drawImage(tiles.leaf, x + lx * TILE, groundY - 4 * TILE, TILE, TILE);
                                    // row 3 (top): 3 leaves
                                    for (let lx = -1; lx <= 1; lx++)
                                        ctx.drawImage(tiles.leaf, x + lx * TILE, groundY - 5 * TILE, TILE, TILE);
                                }
                            }
                            animId = requestAnimationFrame(draw);
                        }
                        animId = requestAnimationFrame(draw);
                    }

                    if (loaded === 4) startAnim();
                },
                'redrock': (container) => {
                    container.style.backgroundColor = '#000';

                    const canvas = document.createElement('canvas');
                    canvas.style.cssText = 'position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0;';
                    container.appendChild(canvas);

                    const lightImg = new Image();
                    lightImg.src = 'games/redrock/light.png';

                    const N = 8;
                    const lights = Array.from({length: N}, (_, i) => ({
                        anchorX: (i + 0.15 + Math.random() * 0.7) / N,
                        length: 0.06 + Math.random() * 0.22,
                        theta: (Math.random() < 0.5 ? 1 : -1) * (0.04 + Math.random() * 0.08),
                        thetaVel: 0,
                        glowR: 90 + Math.random() * 80,
                        phase: Math.random() * Math.PI * 2,
                        speed: 0.6 + Math.random() * 0.8,
                    }));

                    let canvasW = 0, canvasH = 0;
                    const ro = new ResizeObserver(([e]) => {
                        canvasW = Math.round(e.contentRect.width);
                        canvasH = Math.round(e.contentRect.height);
                    });
                    ro.observe(canvas);

                    let animId, lastTs = null;
                    function draw(ts) {
                        if (!canvas.isConnected) { cancelAnimationFrame(animId); ro.disconnect(); return; }
                        const dt = Math.min(lastTs !== null ? ts - lastTs : 16, 50);
                        lastTs = ts;
                        const dtS = dt / 1000;

                        const dpr = window.devicePixelRatio || 1;
                        const needW = Math.round(canvasW * dpr);
                        const needH = Math.round(canvasH * dpr);
                        if (canvas.width !== needW || canvas.height !== needH) {
                            canvas.width = needW;

                        ctx.imageSmoothingEnabled = false;

                        const mobile = window.innerWidth <= 768;
                        for (const l of lights) {
                            const len = l.length * canvasH * (mobile ? 1.4 : 1);
                            const acc = -(200 / Math.max(len, 10)) * Math.sin(l.theta);
                            l.thetaVel += acc * dtS;
                            l.theta += l.thetaVel * dtS;

                            const ax = l.anchorX * canvasW;
                            const x = ax + Math.sin(l.theta) * len;
                            const y = mobile
                                ? canvasH - Math.cos(l.theta) * len
                                : Math.cos(l.theta) * len;

                            // String
                            ctx.beginPath();
                            ctx.moveTo(ax, mobile ? canvasH : 0);
                            ctx.lineTo(x, y);
                            ctx.strokeStyle = '#5F574F';
                            ctx.lineWidth = 3;
                            ctx.stroke();

                            const scale = 6;
                            const sw = lightImg.naturalWidth > 0 ? lightImg.naturalWidth * scale : 0;
                            const sh = lightImg.naturalHeight > 0 ? lightImg.naturalHeight * scale : 0;
                            const glowCy = mobile ? y - sh / 2 : y + sh / 2;
                            const spriteY = mobile ? y - sh : y;

                            // Glow
                            const pulse = 0.85 + 0.15 * Math.sin(ts / 900 * l.speed + l.phase);
                            const r = l.glowR * pulse;
                            const grad = ctx.createRadialGradient(x, glowCy, 0, x, glowCy, r);
                            grad.addColorStop(0,    `rgba(210,50,20,${0.35 * pulse})`);
                            grad.addColorStop(0.35, `rgba(160,25,10,${0.18 * pulse})`);
                            grad.addColorStop(1,    'rgba(80,0,0,0)');
                            ctx.fillStyle = grad;
                            ctx.beginPath();
                            ctx.arc(x, glowCy, r, 0, Math.PI * 2);
                            ctx.fill();

                            // Sprite
                            if (lightImg.complete && lightImg.naturalWidth > 0) {
                                ctx.globalAlpha = 0.65 + 0.35 * (0.5 + 0.5 * Math.sin(ts / 900 * l.speed + l.phase));
                                ctx.drawImage(lightImg, Math.round(x - sw / 2), Math.round(spriteY), sw, sh);
                                ctx.globalAlpha = 1;
                            }
                        }
                        animId = requestAnimationFrame(draw);

    playerLabel.style.cursor = 'pointer';
    mobileSongLabel.style.cursor = 'pointer';

    function goToCurrentAlbum() {
        const musicCatEl = document.querySelector('#categorycolumn .selection[data-cat="music"]');
        if (musicCatEl) selectCategory('music', musicCatEl);
        const albumEl = [...projectCol.querySelectorAll('.selection')].find(el => el.textContent === currentAlbumKey);
        if (albumEl) selectProject('music', currentAlbumKey, albumEl);
    }

    function isMobile() { return window.innerWidth <= 768; }

    function setPath(path) {
        menubarPath.textContent = path;
        mobilePath.textContent  = path;
        history.replaceState(null, '', '#' + path);
    }

    function navigateFromHash() {
        const raw = location.hash.replace(/^#\//, '').replace(/\/$/, '');
        if (!raw) {
            const aboutEl = document.querySelector('#categorycolumn [data-cat="about"]');
            if (aboutEl) selectCategory('about', aboutEl);
            const bioEl = [...projectCol.querySelectorAll('.selection')].find(el => el.textContent === 'bio');
            if (bioEl) selectProject('about', 'bio', bioEl);
            return;
        }
        const parts = raw.split('/');
        const cat   = decodeURIComponent(parts[0]);
        const proj  = parts[1] ? decodeURIComponent(parts[1]) : null;
        const songTitle = parts[2] ? decodeURIComponent(parts.slice(2).join('/')) : null;

        const catEl = document.querySelector(`#categorycolumn [data-cat="${cat}"]`);
        if (!catEl) return;
        selectCategory(cat, catEl);

        if (proj) {
            const projEl = [...projectCol.querySelectorAll('.selection')].find(el => el.textContent === proj);
            if (!projEl) return;
            selectProject(cat, proj, projEl);

            if (songTitle && albums[proj]) {
                const songIdx = albums[proj].findIndex(s => s.title === songTitle);
                const song    = albums[proj][songIdx];
                const songEl  = [...contentArea.querySelectorAll('.song-item')][songIdx];
                if (song && songEl) playSong(proj, song, songEl);
            }
        }
    }

    function playSong(albumKey, song, el) {
        contentArea.querySelectorAll('.song-item').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        currentAlbumKey  = albumKey;
        currentSongIndex = albums[albumKey].indexOf(song);
        audio.src        = 'music/' + albumKey + '/' + song.file;
        audio.currentTime = 0;
        playerLabel.textContent   = song.title;
        mobileSongLabel.textContent = song.title;
        audio.play().catch(() => {});
        setPath('/music/' + albumKey + '/' + song.title);
    }

    audio.addEventListener('ended', () => {
        if (currentAlbumKey === null) return;
        const list = albums[currentAlbumKey];
        const nextIndex = currentSongIndex + 1;
        if (nextIndex >= list.length) return;
        const nextSong = list[nextIndex];
        const songEls = contentArea.querySelectorAll('.song-item');
        const nextEl  = songEls[nextIndex];
        playSong(currentAlbumKey, nextSong, nextEl || document.createElement('p'));
    });

    const albumPadding = 'calc(max(150px, calc(50vh - 6em)))';

    function renderAlbum(albumKey) {
        contentArea.classList.remove('center-view');
        sidebar.classList.remove('divider');
        if (isMobile()) {
            contentArea.style.scrollSnapType   = 'none';
            contentArea.style.paddingTop       = '';
            contentArea.style.scrollPaddingTop = '';
        } else {
            contentArea.style.scrollSnapType   = 'y mandatory';
            contentArea.style.paddingTop       = albumPadding;
            contentArea.style.scrollPaddingTop = albumPadding;
        }
        contentArea.innerHTML = '';
        const coverImg = document.createElement('img');
        coverImg.src = 'music/' + albumKey + '/cover.png';
        coverImg.className = 'album-cover';
        coverImg.onerror = () => { coverImg.style.display = 'none'; };
        contentArea.appendChild(coverImg);
        albums[albumKey].forEach(song => {
            const p = document.createElement('p');
            p.className = 'song-item';

            const titleSpan = document.createElement('span');
            titleSpan.className = 'song-title';
            titleSpan.textContent = song.title;

            const durSpan = document.createElement('span');
            durSpan.className = 'song-duration';

            p.appendChild(titleSpan);
            p.appendChild(durSpan);
            p.addEventListener('click', () => playSong(albumKey, song, p));
            contentArea.appendChild(p);

            const tmp = new Audio();
            tmp.preload = 'metadata';
            tmp.onloadedmetadata = () => {
                const s = Math.floor(tmp.duration);
                durSpan.textContent = Math.floor(s / 60) + ':' + ('0' + (s % 60)).slice(-2);
            };
            tmp.src = 'music/' + albumKey + '/' + song.file;
        });
        if (albumKey === currentAlbumKey) {
            const songEls = contentArea.querySelectorAll('.song-item');
            if (songEls[currentSongIndex]) songEls[currentSongIndex].classList.add('active');
        }
        const credits = document.createElement('p');
        credits.style.cssText = 'padding: 14px 14px 14px 5px; font-size: 18px; color: rgba(255,255,255,0.5);';
        credits.innerHTML = albumCredits[albumKey] || '';
        contentArea.appendChild(credits);
    }

    function selectCategory(cat, el) {
        document.querySelectorAll('#categorycolumn .selection').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        setPath('/' + cat + '/');
        projectCol.innerHTML  = '';
        contentArea.innerHTML = '';
        contentArea.style.backgroundColor = '';
        contentArea.style.backgroundImage = '';
        contentArea.style.backgroundSize = '';
        contentArea.style.backgroundPosition = '';
        contentArea.style.backgroundRepeat = '';
        contentArea.style.position = '';
        sidebar.classList.remove('divider');

        data[cat].projects.forEach(proj => {
            const p = document.createElement('p');
            p.className = 'selection';
            p.textContent = proj;
            p.addEventListener('click', () => selectProject(cat, proj, p));
            projectCol.appendChild(p);
        });
    }

    function selectProject(cat, proj, el) {
        document.querySelectorAll('#projectcolumn .selection, .mob-acc-proj').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        setPath('/' + cat + '/' + proj + '/');
        mobileNav.classList.remove('open');
        setHamburgerOpen(false);

        if (albums[proj]) {
            renderAlbum(proj);
        } else {
            contentArea.classList.remove('center-view');
            if (proj !== 'covers' && proj !== 'digital') contentArea.classList.add('center-view');
            sidebar.classList.add('divider');
            contentArea.style.scrollSnapType   = 'none';
            contentArea.style.paddingTop       = '0';
            contentArea.style.scrollPaddingTop = '0';
            const content = data[cat].content[proj];
            contentArea.innerHTML = '';
            contentArea.style.backgroundColor = '';
            contentArea.style.backgroundImage = '';
            contentArea.style.backgroundSize = '';
            contentArea.style.backgroundPosition = '';
            contentArea.style.backgroundRepeat = '';
            contentArea.style.position = '';
            contentArea.style.display = '';
            if (typeof content === 'function') content(contentArea);
            else contentArea.innerHTML = content || '';
        }
    }

    playerLabel.addEventListener('click', goToCurrentAlbum);
    mobileSongLabel.addEventListener('click', goToCurrentAlbum);

    document.querySelectorAll('#categorycolumn .selection').forEach(el => {
        el.addEventListener('click', () => selectCategory(el.dataset.cat, el));
    });

    const hiddenCats = new Set(['software', 'misc']);
    Object.keys(data).filter(cat => !hiddenCats.has(cat)).forEach(cat => {
        const catBtn = document.createElement('p');
        catBtn.className = 'mob-acc-cat';
        catBtn.textContent = cat;

        const accWrap = document.createElement('div');
        accWrap.className = 'mob-acc-wrap';

        const accInner = document.createElement('div');
        accInner.className = 'mob-acc-inner';

        data[cat].projects.forEach(proj => {
            const pm = document.createElement('p');
            pm.className = 'selection mob-acc-proj';
            pm.textContent = proj;
            pm.addEventListener('click', () => selectProject(cat, proj, pm));
            accInner.appendChild(pm);
        });

        accWrap.appendChild(accInner);

        catBtn.addEventListener('click', () => {
            const isOpen = accWrap.classList.contains('open');
            mobileNavInner.querySelectorAll('.mob-acc-wrap').forEach(w => w.classList.remove('open'));
            mobileNavInner.querySelectorAll('.mob-acc-cat').forEach(b => b.classList.remove('open'));
            if (!isOpen) {
                accWrap.classList.add('open');
                catBtn.classList.add('open');
            }
        });

        mobileNavInner.appendChild(catBtn);
        mobileNavInner.appendChild(accWrap);
    });

    const hamburgerBtn  = document.getElementById('hamburger-btn');
    const hamburgerIcon = document.getElementById('hamburger-icon');
    const closeIcon     = document.getElementById('close-icon');
    function setHamburgerOpen(open) {
        hamburgerIcon.style.display = open ? 'none' : '';
        closeIcon.style.display     = open ? '' : 'none';
    }
    hamburgerBtn.addEventListener('click', () => {
        const nowOpen = mobileNav.classList.toggle('open');
        setHamburgerOpen(nowOpen);
    });

    window.addEventListener('resize', () => {
        if (!contentArea.querySelector('.song-item')) return;
        if (isMobile()) {
            contentArea.style.scrollSnapType   = 'none';
            contentArea.style.paddingTop       = '';
            contentArea.style.scrollPaddingTop = '';
        } else {
            contentArea.style.scrollSnapType   = 'y mandatory';
            contentArea.style.paddingTop       = albumPadding;
            contentArea.style.scrollPaddingTop = albumPadding;
        }
    });

    window.addEventListener('hashchange', navigateFromHash);
    navigateFromHash();
})();
</script>
</body>
</html>
